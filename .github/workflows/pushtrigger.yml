name: Pathology Frontend pushtrigger

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -------- Checkout --------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------- Docker setup --------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------- Login to Docker Hub --------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------- Build Docker image  --------
      - name: Build Docker image
        run: |
          docker build --no-cache \
            --build-arg VITE_API_BASE_URL=https://dummyjson.com \
            -f devops/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/pathology-frontend:${{ github.run_number }} \
            .

      # -------- Tag stable --------
      - name: Tag stable image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/pathology-frontend:${{ github.run_number }} \
                     ${{ secrets.DOCKER_USERNAME }}/pathology-frontend:stable

      # -------- Push images --------
      - name: Push images to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pathology-frontend:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/pathology-frontend:stable

      # -------- Deploy to VPS --------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/apps/pathology

            # Stop and remove old container 
            docker compose down

            # Pull latest image
            docker compose pull frontend

            # Start fresh container
            docker compose up -d frontend
